<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KubeWealth Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 40px; }
        .card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        button { background-color: #4CAF50; color: white; border: none; padding: 10px 16px; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #45a049; }
        .result { margin-top: 10px; padding: 10px; background-color: #eef1f1; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body>
    <h1>💰 KubeWealth Dashboard</h1>
    
    <div class="card">
        <h3>1. Transaction Service (Go)</h3>
        <button onclick="triggerTransaction()">Trigger Transfer</button>
        <div id="trans-result" class="result">Click the button to send a transaction.</div>
    </div>

    <div class="card">
        <h3>2. Balance Service (Python)</h3>
        <button onclick="fetchBalance()">Get Balance for 'atharv'</button>
        <div id="bal-result" class="result">Click to fetch balance.</div>
    </div>

    <div class="card">
        <h3>3. Identity Service (Java)</h3>
        <button onclick="fetchAuth()">Test Authentication</button>
        <div id="auth-result" class="result">Click to test authentication.</div>
    </div>

    <script>
        // We no longer specify ports. All requests go to the Nginx proxy on port 80.
        const API_BASE = "/api";

        async function triggerTransaction() {
            try {
                // Nginx sees /api/transfer and routes it internally to transaction:8080
                const response = await fetch(`${API_BASE}/transfer`, { method: 'POST' });
                const data = await response.text();
                document.getElementById('trans-result').innerText = data;
            } catch (e) {
                document.getElementById('trans-result').innerText = "Error calling Transaction Service";
            }
        }

        async function fetchBalance() {
            try {
                // Nginx sees /api/balance/atharv and routes it internally to balance:8000
                const response = await fetch(`${API_BASE}/balance/atharv`);
                const data = await response.json();
                document.getElementById('bal-result').innerText = JSON.stringify(data, null, 2);
            } catch (e) {
                document.getElementById('bal-result').innerText = "Error calling Balance Service";
            }
        }

        async function fetchAuth() {
            try {
                // Nginx sees /api/auth and routes it internally to identity:8080
                const response = await fetch(`${API_BASE}/auth`);
                const data = await response.text();
                document.getElementById('auth-result').innerText = data;
            } catch (e) {
                document.getElementById('auth-result').innerText = "Error calling Identity Service";
            }
        }
    </script>
</body>
</html>
