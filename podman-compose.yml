services:
  transaction:
    build: ./go
    ports:
      - "8080:8080"
    environment:
      - BALANCE_SERVICE_URL=http://balance:8000

  balance:
    build: ./python
    ports:
      - "8000:8000"
    # Ensure requirements.txt includes: fastapi, uvicorn 

  identity:
    build: ./java
    ports:
      - "8081:8081"