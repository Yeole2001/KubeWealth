services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - transaction
      - balance
      - identity

  transaction:
    build: ./go
    # ports:
    #   - "8080:8080"
    # environment:
    #   - BALANCE_SERVICE_URL=http://balance:8000

  balance:
    build: ./python
    # ports:
    #   - "8000:8000"
    # # Ensure requirements.txt includes: fastapi, uvicorn 

  identity:
    build: ./java
    # ports:
    #   - "8081:8081"
    environment:
      - SERVER_PORT=8080 # tomcat listening on port 8080

  frontend:
    build: ./frontend
    # ports:
    #   - "80:80"